<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Setup | BlueFalcon</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='modern/favicon.svg') }}" />
    {% include 'tailwind_config.html' %}
  </head>
  <body class="min-h-screen flex items-center justify-center p-4 sm:p-6 text-left relative overflow-hidden">
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="panel max-w-4xl w-full relative z-10 anim-scale-in p-0 overflow-visible">
        <div class="border-b border-slate-100 px-6 sm:px-10 py-6 sm:py-8 flex items-center justify-between bg-white/50 rounded-t-[20px] sm:rounded-t-[28px]">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-ink">System Initialization</h1>
                <p class="mt-1 text-sm text-ink-faint">Configure your new deployment.</p>
            </div>
            <span class="chip chip-info px-3 py-1.5 text-xs">Step 1 of 1</span>
        </div>
        
        <form action="/wizard" method="POST" class="px-6 sm:px-10 py-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 sm:gap-10">
                <div class="space-y-4">
                    <h2 class="text-base font-bold text-ink border-b border-slate-100 pb-2">Control Plane</h2>
                    <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Node Name</span><input type="text" name="server_name" value="BlueFalcon Node" required class="input-field"></label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Admin User</span><input type="text" name="admin_user" value="admin" required class="input-field"></label>
                        <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Admin Pass</span><input type="password" name="admin_pass" value="admin" required class="input-field"></label>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Web UI Port</span><input type="number" name="panel_port" value="2020" required class="input-field"></label>
                        <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Server IP</span><input type="text" name="public_ip" value="{{ server_ip }}" required class="input-field"></label>
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-base font-bold text-ink border-b border-slate-100 pb-2">OpenVPN Engine</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Protocol</span><select name="protocol" class="input-field"><option value="udp">UDP</option><option value="tcp">TCP</option></select></label>
                        <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Port</span><input type="number" name="port" value="1194" required class="input-field"></label>
                    </div>
                    <div>
                        <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">DNS Resolver</span>
                        <select name="dns_preset" class="input-field" onchange="const c = document.getElementById('cd_div'); if(this.value==='custom'){c.style.display='grid'; document.getElementById('cd1').required=true;}else{c.style.display='none'; document.getElementById('cd1').required=false;}">
                            <option value="1.1.1.1">Cloudflare (1.1.1.1)</option>
                            <option value="8.8.8.8">Google (8.8.8.8)</option>
                            <option value="custom">Custom IP...</option>
                        </select>
                        </label>
                        <div id="cd_div" class="grid grid-cols-2 gap-3 mt-3" style="display: none;">
                            <input type="text" id="cd1" name="custom_dns1" placeholder="Primary IP" class="input-field text-sm">
                            <input type="text" name="custom_dns2" placeholder="Secondary IP" class="input-field text-sm">
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100">
                <h2 class="text-base font-bold text-ink mb-3">Cloudflare WARP Shielding</h2>
                <div class="p-4 sm:p-5 rounded-2xl border border-slate-100 bg-surface-muted/50">
                    <label class="toggle-row cursor-pointer flex items-center mb-0 p-0 hover:bg-transparent">
                        <span class="text-sm font-semibold text-ink">Deploy background service</span>
                        <input type="checkbox" name="install_warp" class="toggle-input" onchange="document.getElementById('w_set').style.display = this.checked ? 'block' : 'none';">
                        <span class="toggle-ui"></span>
                    </label>
                    <div id="w_set" class="mt-4 space-y-4" style="display: none;">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Network Architecture</span><select name="warp_target" class="input-field"><option value="3">Dual-Stack</option><option value="1">IPv4 Only</option><option value="2">IPv6 Only</option></select></label>
                            <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">License Key</span><input type="text" name="warp_license" placeholder="Optional" class="input-field"></label>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-fill w-full justify-center mt-8 py-3.5 text-[15px]">Initialize Deployment</button>
        </form>
    </div>
  </body>
</html>
