<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Admin Panel</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='modern/favicon.svg') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: { DEFAULT: '#f8faff', card: '#ffffff', muted: '#eef2f9' },
              ink: { DEFAULT: '#0f172a', soft: '#475569', faint: '#94a3b8' },
              brand: { blue: '#2563eb', purple: '#7c3aed', pink: '#ec4899', green: '#10b981', orange: '#f59e0b', cyan: '#06b6d4' }
            },
            boxShadow: { soft: '0 4px 24px rgba(15, 23, 42, 0.06)', card: '0 8px 32px rgba(15, 23, 42, 0.08)' }
          }
        }
      }
    </script>
    <script>
      window.APP_DATA = {
        total_rx: "{{ t_rx|format_bytes }}",
        total_tx: "{{ t_tx|format_bytes }}",
        users_count: "{{ users|length }}",
        users: [
          {% for u in users %}
          { id: "{{ u['system_name'] }}", name: "{{ u['display_name'] }}", status: "{{ u['status'] }}", usage: "{{ stats[u['system_name']]['usage']|format_bytes }}" },
          {% endfor %}
        ]
      };
    </script>
    <style type="text/tailwindcss">
      {% include 'style_snippet.html' %}
    </style>
  </head>
  <body class="min-h-screen overflow-x-hidden pb-safe text-left">
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="app-layout relative z-10 mx-auto min-h-screen w-full max-w-[1600px] pt-4 sm:pt-6 lg:px-6 lg:pb-6 lg:pt-12">
    <aside id="sidebar" class="sidebar-drawer sidebar-panel lg:self-start" aria-label="Menu">
        <div class="sidebar-head relative z-[1] mb-5 flex items-center justify-between gap-3 sm:mb-6">
          <div class="flex min-w-0 items-center gap-3">
            <div class="logo-box">
              <span class="text-lg">BF</span>
            </div>
            <div class="flex-1">
              <h1 class="text-[14px] font-bold text-ink">BlueFalcon Panel</h1>
              <p class="text-[11px] text-ink-faint">{{ app_version }} Engine</p>
            </div>
          </div>
          <button id="close-btn" type="button" class="btn-ghost shrink-0 lg:hidden" aria-label="Close"><span id="icon-close"></span></button>
        </div>

        <p class="relative z-[1] mb-2 px-2 text-[10px] font-semibold text-ink-faint">MAIN MENU</p>
        <nav class="relative z-[1] flex flex-col gap-1">
          <a href="#" data-nav="dashboard" class="nav-link nav-link-active">
            <span class="nav-pill" aria-hidden="true"></span>
            <span class="nav-ico"><span data-icon="dashboard" data-icon-size="md"></span></span>
            <span>Dashboard</span>
          </a>
          <a href="#" data-nav="users" class="nav-link">
            <span class="nav-ico"><span data-icon="users" data-icon-size="md"></span></span>
            <span>OpenVPN Users</span>
          </a>
          <a href="#" data-nav="logs" class="nav-link">
            <span class="nav-ico"><span data-icon="transactions" data-icon-size="md"></span></span>
            <span>VPN Logs</span>
          </a>
          <a href="#" data-nav="analytics" class="nav-link">
            <span class="nav-ico"><span data-icon="analytics" data-icon-size="md"></span></span>
            <span>Network Stats</span>
          </a>
          <a href="#" data-nav="settings" class="nav-link">
            <span class="nav-ico"><span data-icon="settings" data-icon-size="md"></span></span>
            <span>Settings</span>
          </a>
        </nav>

        <div class="status-box relative z-[1]">
          <div class="flex items-center gap-3">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-white text-emerald-600 shadow-soft" id="icon-server"></div>
            <div class="min-w-0">
              <p class="text-[11px] text-emerald-700/70">Server Status</p>
              <p class="text-[13px] font-bold text-emerald-700">Online 99.9%</p>
            </div>
          </div>
        </div>
    </aside>

      <div class="main-column flex min-w-0 flex-1 flex-col gap-3 p-3 sm:gap-4 sm:p-4 lg:gap-5 lg:p-6">
        <header class="header-bar enter-header">
          <div class="header-inner relative z-[1] flex w-full flex-wrap items-center gap-2 sm:gap-3">
            <button id="menu-btn" type="button" class="btn-ghost shrink-0 lg:hidden" aria-expanded="false" aria-controls="sidebar">
              <span id="icon-menu"></span>
            </button>
            <div class="min-w-0 flex-1">
              <h1 class="truncate text-lg font-bold text-ink sm:text-xl" data-page-title>Dashboard</h1>
              <p class="truncate text-[11px] text-ink-faint sm:text-[12px]" data-page-subtitle>Welcome back, Administrator</p>
            </div>

            <div class="header-btns flex shrink-0 flex-wrap items-center justify-end gap-2">
              <button type="button" id="btn-new-tx" class="btn-fill btn-new-tx shrink-0">
                <span data-icon="plus" data-icon-size="sm"></span>
                <span class="btn-label">New VPN User</span>
              </button>
              <div class="dropdown-wrap">
                <button type="button" id="btn-profile" class="profile-btn shrink-0" aria-expanded="false">
                  <div class="profile-text hidden text-right xs:block sm:block">
                    <p class="max-w-[100px] truncate text-[13px] font-semibold text-ink sm:max-w-none">Administrator</p>
                  </div>
                  <div class="avatar">A</div>
                </button>
              </div>
            </div>
          </div>
        </header>

        <main id="page-root" class="page-root flex min-w-0 flex-1 flex-col gap-3 sm:gap-4 lg:gap-5"></main>
      </div>
    </div>

    <button type="button" id="fab-new-tx" class="fab lg:hidden" aria-label="New VPN User">
      <span data-icon="plus" data-icon-size="md"></span>
    </button>

    <div id="modal-backdrop" class="modal-backdrop hidden" aria-hidden="true">
      <div id="modal-tx" class="modal hidden" role="dialog" aria-labelledby="modal-tx-title" aria-modal="true">
        <div class="modal-head">
          <h2 id="modal-tx-title" class="text-lg font-bold text-ink">New VPN User</h2>
          <button type="button" id="modal-close" class="btn-ghost" aria-label="Close"><span data-icon="close" data-icon-size="sm"></span></button>
        </div>
        <form id="form-tx" class="modal-body space-y-3" method="POST" action="/openvpn">
          <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Username</span><input class="input-field" name="new_user" required placeholder="e.g. John Doe" /></label>
          <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Password</span><input class="input-field" name="new_pass" type="password" required placeholder="***" dir="ltr" /></label>
          <label class="block"><span class="mb-1 block text-[12px] text-ink-faint">Expiry (Days)</span><input class="input-field" name="exp_days" type="number" required placeholder="30" dir="ltr" inputmode="numeric" /></label>
          <button type="submit" class="btn-fill w-full justify-center">Provision Client</button>
        </form>
      </div>
    </div>

    <div id="toast-stack" class="toast-stack" aria-live="polite"></div>

    <script type="module" src="{{ url_for('static', filename='modern/main.js') }}"></script>
  </body>
</html>
