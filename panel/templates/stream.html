<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Deploying... | BlueFalcon Panel</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='modern/favicon.svg') }}" />
    {% include 'tailwind_config.html' %}
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 text-left relative overflow-hidden">
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="w-full max-w-3xl relative z-10">
        <div class="mb-6 text-center anim-fade-up">
            <h1 class="text-xl sm:text-2xl font-bold flex items-center justify-center gap-3 text-ink">
                <svg class="animate-spin h-6 w-6 text-brand-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Deploying Architecture
            </h1>
            <p class="mt-2 text-sm text-ink-faint">Do not close this window. Redirecting upon completion.</p>
        </div>

        <div class="panel p-0 overflow-hidden anim-scale-in">
            <div class="bg-surface-muted/80 px-4 py-3 flex items-center gap-2 border-b border-slate-100">
                <div class="w-3 h-3 rounded-full bg-rose-400"></div>
                <div class="w-3 h-3 rounded-full bg-amber-400"></div>
                <div class="w-3 h-3 rounded-full bg-emerald-400"></div>
            </div>
            <pre id="logOutput" class="p-6 text-brand-blue bg-white/50 font-mono text-sm h-[50vh] overflow-y-auto whitespace-pre-wrap leading-relaxed shadow-inner"></pre>
        </div>
    </div>

    <script>
        const logWindow = document.getElementById('logOutput');
        const source = new EventSource('/api/install_execute');
        source.onmessage = function(event) {
            if (event.data === "[DONE]") {
                source.close();
                window.location.href = "/login";
            } else {
                logWindow.innerHTML += event.data + "\n";
                logWindow.scrollTop = logWindow.scrollHeight;
            }
        };
    </script>
  </body>
</html>
