<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | BlueFalcon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0F0F11 !important; color: #F3F4F6 !important; }
        .material-card { background: #1C1C1E !important; border-radius: 24px; border: 1px solid #2C2C2E !important; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5) !important; }
        .input-field { width: 100%; padding: 0.85rem 1.25rem; background-color: #2C2C2E !important; border: 1px solid #3A3A3C !important; color: #F3F4F6 !important; border-radius: 12px; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #A8C7FA !important; box-shadow: 0 0 0 2px rgba(168,199,250,0.1) !important; }
        h1 { color: #A8C7FA !important; }
        p { color: #9CA3AF !important; }
        .bg-\\[\\#0B57D0\\] { background-color: #A8C7FA !important; color: #0F0F11 !important; font-weight: 700 !important; }
        .hover\\:bg-\\[\\#0842A0\\]:hover { background-color: #8AB4F8 !important; }
        .bg-\\[\\#FCE8E6\\] { background-color: #3B1A1A !important; color: #F28B82 !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md material-card p-10 text-center">
        <h1 class="text-3xl font-bold mb-2 tracking-tight">BlueFalcon</h1>
        <p class="mb-8 font-medium">Sign in to manage your node</p>
        
        {% if error %}
            <div class="bg-[#FCE8E6] px-4 py-3 rounded-xl text-sm font-medium mb-6">{{ error }}</div>
        {% endif %}
        
        <form action="/login" method="POST" class="space-y-5 text-left">
            <div><input type="text" name="username" placeholder="Username" required class="input-field"></div>
            <div><input type="password" name="password" placeholder="Password" required class="input-field"></div>
            <button type="submit" class="w-full bg-[#0B57D0] hover:bg-[#0842A0] py-3.5 rounded-xl shadow-sm transition text-lg mt-2">Sign In</button>
        </form>
    </div>
</body>
</html>
