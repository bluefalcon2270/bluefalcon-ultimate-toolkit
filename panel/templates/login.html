<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Login | BlueFalcon Panel</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='modern/favicon.svg') }}" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: { DEFAULT: '#f8faff', card: '#ffffff', muted: '#eef2f9' },
              ink: { DEFAULT: '#0f172a', soft: '#475569', faint: '#94a3b8' },
              brand: { blue: '#2563eb', purple: '#7c3aed', pink: '#ec4899', green: '#10b981', orange: '#f59e0b', cyan: '#06b6d4' }
            },
            boxShadow: { soft: '0 4px 24px rgba(15, 23, 42, 0.06)', card: '0 8px 32px rgba(15, 23, 42, 0.08)' }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      {% include 'style_snippet.html' %}
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 text-left relative overflow-hidden">
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <div class="panel w-full max-w-md p-8 sm:p-10 relative z-10 text-center anim-scale-in">
        <div class="flex justify-center mb-4">
            <div class="logo-box">BF</div>
        </div>
        <h1 class="text-2xl sm:text-3xl font-bold mb-2 tracking-tight text-ink">BlueFalcon</h1>
        <p class="mb-8 font-medium text-ink-soft text-sm sm:text-base">Sign in to your control panel</p>
        
        {% if error %}
            <div class="chip chip-fail w-full justify-center mb-6 py-2 text-sm">
                <span class="font-bold">{{ error }}</span>
            </div>
        {% endif %}
        
        <form action="/login" method="POST" class="space-y-4 text-left">
            <label class="block">
                <span class="mb-1 block text-[12px] text-ink-faint">Username</span>
                <input type="text" name="username" placeholder="admin" required class="input-field" autocomplete="username">
            </label>
            <label class="block">
                <span class="mb-1 block text-[12px] text-ink-faint">Password</span>
                <input type="password" name="password" placeholder="••••••••" required class="input-field" autocomplete="current-password">
            </label>
            <button type="submit" class="btn-fill w-full justify-center mt-6 py-3 text-[14px]">Secure Login</button>
        </form>
    </div>
  </body>
</html>
