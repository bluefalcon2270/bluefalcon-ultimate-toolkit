{% extends 'base.html' %}
{% block title %}Log Center | BlueFalcon{% endblock %}
{% block header_title %}Log Center{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto h-[75vh] flex flex-col">
    <!-- Tab Navigation -->
    <div class="flex gap-2 mb-4 bg-white p-2 material-card w-fit">
        <a href="/logs?type=panel" class="px-6 py-2 rounded-xl text-sm font-medium transition {% if current_type == 'panel' %}bg-[#E8F0FE] text-[#0B57D0]{% else %}text-gray-600 hover:bg-gray-100{% endif %}">Web Panel</a>
        <a href="/logs?type=openvpn" class="px-6 py-2 rounded-xl text-sm font-medium transition {% if current_type == 'openvpn' %}bg-[#E8F0FE] text-[#0B57D0]{% else %}text-gray-600 hover:bg-gray-100{% endif %}">OpenVPN</a>
        <a href="/logs?type=warp" class="px-6 py-2 rounded-xl text-sm font-medium transition {% if current_type == 'warp' %}bg-[#E8F0FE] text-[#0B57D0]{% else %}text-gray-600 hover:bg-gray-100{% endif %}">WARP Shield</a>
        <a href="/logs?type=system" class="px-6 py-2 rounded-xl text-sm font-medium transition {% if current_type == 'system' %}bg-[#E8F0FE] text-[#0B57D0]{% else %}text-gray-600 hover:bg-gray-100{% endif %}">System Auth</a>
    </div>

    <!-- Terminal Output -->
    <div class="flex-1 bg-[#131314] rounded-3xl shadow-md overflow-hidden flex flex-col border border-gray-200">
        <div class="bg-[#1F1F22] px-6 py-3 flex items-center justify-between border-b border-gray-800">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Live Output Buffer</span>
            <a href="/logs?type={{ current_type }}" class="text-xs font-medium text-gray-400 hover:text-white transition">Refresh</a>
        </div>
        <div class="p-6 overflow-y-auto flex-1">
            <pre class="text-[#A8C7FA] font-mono text-sm whitespace-pre-wrap leading-relaxed">{{ logs }}</pre>
        </div>
    </div>
</div>
{% endblock %}
