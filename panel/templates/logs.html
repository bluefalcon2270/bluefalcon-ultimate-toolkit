{% extends 'base.html' %}
{% block title %}Log Center | BlueFalcon{% endblock %}
{% block header_title %}Log Center{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto h-[75vh] flex flex-col">
    <!-- Dropdown Navigation -->
    <div class="mb-4 w-64 relative">
        <select onchange="window.location.href='/logs?type=' + this.value" class="input-field w-full px-4 py-3 rounded-xl font-medium appearance-none cursor-pointer">
            <option value="unified" {% if current_type == 'unified' %}selected{% endif %}>Unified Master Stream</option>
            <option value="panel" {% if current_type == 'panel' %}selected{% endif %}>Web Panel Core</option>
            <option value="openvpn" {% if current_type == 'openvpn' %}selected{% endif %}>OpenVPN Service</option>
            <option value="warp" {% if current_type == 'warp' %}selected{% endif %}>WARP Shield</option>
            <option value="auth" {% if current_type == 'auth' %}selected{% endif %}>Security & Auth</option>
            <option value="ufw" {% if current_type == 'ufw' %}selected{% endif %}>Firewall (UFW)</option>
            <option value="kernel" {% if current_type == 'kernel' %}selected{% endif %}>Kernel & Network</option>
            <option value="pkg" {% if current_type == 'pkg' %}selected{% endif %}>Package Manager (APT)</option>
            <option value="cron" {% if current_type == 'cron' %}selected{% endif %}>Cron Tasks</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
    </div>
    <!-- Terminal Output -->
    <div class="flex-1 bg-[#131314] rounded-3xl shadow-md overflow-hidden flex flex-col border border-gray-200">
        <div class="bg-[#1F1F22] px-6 py-3 flex items-center justify-between border-b border-gray-800">
            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Live Output Buffer</span>
            <a href="/logs?type={{ current_type }}" class="text-xs font-medium text-gray-400 hover:text-white transition">Refresh</a>
        </div>
        <div class="p-6 overflow-y-auto flex-1">
            <pre class="text-[#A8C7FA] font-mono text-sm whitespace-pre-wrap leading-relaxed">{{ logs }}</pre>
        </div>
    </div>
</div>
{% endblock %}
